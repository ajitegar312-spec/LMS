<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LMS Dashboard v2.0 - Premium Edition</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Konfigurasi warna kustom tema profesional
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              dark: '#0f172a',      /* Slate 900 */
              card: '#1e293b',      /* Slate 800 */
              accent: '#38bdf8',    /* Sky 400 (Neon blue vibe) */
              success: '#4ade80'    /* Green 400 */
            }
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    /* Efek scrollbar halus */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
  </style>
</head>
<body class="bg-brand-dark text-slate-100 min-h-screen flex flex-col justify-between">

  <header class="border-b border-slate-800 bg-brand-card/50 backdrop-blur-md sticky top-0 z-50 px-6 py-4">
    <div class="max-w-5xl mx-auto flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="bg-gradient-to-tr from-sky-500 to-indigo-600 p-2 rounded-xl text-white shadow-lg shadow-sky-500/20">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>
        </div>
        <h1 class="text-xl font-bold tracking-tight bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">EduSpace <span class="text-brand-accent font-medium text-sm px-2 py-0.5 rounded-full bg-sky-500/10 border border-sky-500/20 ml-1">LMS</span></h1>
      </div>
      <div class="flex items-center gap-2 text-sm text-slate-400 bg-slate-800/50 px-3 py-1.5 rounded-lg border border-slate-700">
        <span class="w-2 h-2 rounded-full bg-brand-success animate-pulse"></span>
        <span>Cloudflare DB Connected</span>
      </div>
    </div>
  </header>

  <main class="max-w-5xl mx-auto w-full p-6 flex-grow grid grid-cols-1 md:grid-cols-3 gap-8">
    
    <section class="md:col-span-1">
      <div class="bg-brand-card border border-slate-800 rounded-2xl p-6 sticky top-24 shadow-xl">
        <h2 class="text-lg font-semibold text-white mb-1">Buat Artikel Baru</h2>
        <p class="text-xs text-slate-400 mb-5">Publikasikan materi atau catatan LMS Anda secara langsung ke database.</p>
        
        <div class="space-y-4">
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1 uppercase tracking-wider">Judul Artikel</label>
            <input type="text" id="input-title" placeholder="Contoh: Belajar Cloudflare D1" 
                   class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-brand-accent transition-colors">
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1 uppercase tracking-wider">Isi / Konten</label>
            <textarea id="input-content" rows="5" placeholder="Tulis pembahasan lengkap materi Anda di sini..." 
                      class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-brand-accent transition-colors resize-none"></textarea>
          </div>
          <button onclick="simpanArtikelBaru()" 
                  class="w-full bg-gradient-to-r from-sky-500 to-blue-600 text-white font-medium text-sm py-3 px-4 rounded-xl hover:from-sky-400 hover:to-blue-500 active:scale-[0.98] transition-all shadow-lg shadow-sky-500/10">
            🚀 Publikasikan Artikel
          </button>
        </div>
      </div>
    </section>

    <section class="md:col-span-2 space-y-6">
      <div class="flex items-center justify-between border-b border-slate-800 pb-3">
        <h2 class="text-lg font-semibold text-white flex items-center gap-2">
          Materi Terbaru 
          <span id="article-count" class="text-xs bg-slate-800 text-slate-300 px-2 py-0.5 rounded-md">0</span>
        </h2>
        <button onclick="ambilDataArtikel()" class="text-xs text-brand-accent hover:underline flex items-center gap-1">
          🔄 Segarkan Data
        </button>
      </div>

      <div id="articles-container" class="space-y-4">
        <div id="loading-state" class="text-center py-12 bg-brand-card/30 border border-dashed border-slate-800 rounded-2xl">
          <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-brand-accent border-r-2 mb-3"></div>
          <p class="text-sm text-slate-400">Menghubungkan ke Cloudflare D1 & memuat materi...</p>
        </div>
      </div>
    </section>

  </main>

  <footer class="border-t border-slate-800 bg-brand-card/30 py-4 px-6 text-center text-xs text-slate-500">
    <p>&copy; 2026 EduSpace LMS. Powered by Cloudflare D1 & Workers.</p>
  </footer>

  <script>
    // Konfigurasi API
    const API_URL = 'https://lms.agungbarliansaputra.workers.dev/api/articles';
    // Gunakan Token JWT yang sudah valid
    const JWT_TOKEN = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiYWRtaW4iOnRydWUsImlhdCI6MTUxNjIzOTAyMn0.QMUFsIDTnFmyG3nMiGM6SDlOWk5GTlVSR0Yzd2g3U21xSnAtUXYzMA";

    // 1. Ambil Data dari Database (GET)
    async function ambilDataArtikel() {
      const container = document.getElementById('articles-container');
      const countBadge = document.getElementById('article-count');
      
      try {
        const response = await fetch(API_URL, {
          method: 'GET',
          headers: { 'Authorization': `Bearer ${JWT_TOKEN}` }
        });
        const result = await response.json();

        if (result.success && result.data) {
          container.innerHTML = '';
          countBadge.innerText = result.data.length;

          if (result.data.length === 0) {
            container.innerHTML = `
              <div class="text-center py-12 text-slate-500 border border-dashed border-slate-800 rounded-2xl">
                📭 Belum ada materi yang diterbitkan. Silakan tambah di panel sebelah kiri!
              </div>`;
            return;
          }

          result.data.forEach(article => {
            const dateStr = article.created_at ? new Date(article.created_at).toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' }) : 'Baru saja';
            
            const card = document.createElement('div');
            card.className = "bg-brand-card border border-slate-800 p-6 rounded-2xl hover:border-slate-700 transition-all shadow-md flex flex-col justify-between gap-4";
            card.innerHTML = `
              <div>
                <div class="flex items-center justify-between text-xs text-slate-400 mb-2">
                  <span class="bg-slate-700/50 px-2 py-1 rounded text-slate-300 font-medium">📝 Oleh: ${article.author || 'Anonymous'}</span>
                  <span>${dateStr}</span>
                </div>
                <h3 class="text-md font-semibold text-white mb-2">${article.title}</h3>
                <p class="text-sm text-slate-400 leading-relaxed whitespace-pre-line">${article.content}</p>
              </div>
              <div class="flex justify-end border-t border-slate-800/60 pt-3">
                <button onclick="hapusArtikel('${article.id}')" class="text-xs font-medium text-rose-400 hover:bg-rose-500/10 px-3 py-1.5 rounded-lg border border-rose-500/20 transition-all">
                  🗑️ Hapus Artikel
                </button>
              </div>
            `;
            container.appendChild(card);
          });
        } else {
          tampilkanError("Gagal memuat data dari API.");
        }
      } catch (error) {
        console.error(error);
        tampilkanError("Gagal terhubung ke API Server. Cek CORS atau koneksi internet.");
      }
    }

    // 2. Tambah Artikel Baru ke Database (POST)
    async function simpanArtikelBaru() {
      const titleInput = document.getElementById('input-title');
      const contentInput = document.getElementById('input-content');

      if (!titleInput.value.trim() || !contentInput.value.trim()) {
        alert("⚠️ Judul dan konten materi tidak boleh kosong!");
        return;
      }

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${JWT_TOKEN}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            title: titleInput.value.trim(),
            content: contentInput.value.trim()
          })
        });
        const result = await response.json();

        if (result.success) {
          titleInput.value = '';
          contentInput.value = '';
          ambilDataArtikel(); // Refresh otomatis agar artikel baru masuk list
        } else {
          alert("Gagal menyimpan: " + result.error);
        }
      } catch (error) {
        alert("Gagal mengirim data ke server.");
      }
    }

    // 3. SISTEM KEREN: Hapus Langsung dari Database D1 (DELETE)
    async function hapusArtikel(id) {
      if (!confirm("Apakah Anda yakin ingin menghapus materi ini dari database?")) return;

      try {
        const response = await fetch(`${API_URL}/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${JWT_TOKEN}` }
        });
        const result = await response.json();

        if (result.success) {
          ambilDataArtikel(); // Refresh otomatis setelah dihapus
        } else {
          alert("Gagal menghapus: " + result.error);
        }
      } catch (error) {
        alert("Terjadi kesalahan sistem saat mencoba menghapus.");
      }
    }

    function tampilkanError(pesan) {
      const container = document.getElementById('articles-container');
      container.innerHTML = `
        <div class="text-center py-8 bg-rose-500/10 border border-rose-500/20 text-rose-400 rounded-2xl text-sm">
          ❌ ${pesan}
        </div>`;
    }

    // Jalankan otomatis saat halaman pertama kali dibuka browser
    window.onload = ambilDataArtikel;
  </script>
</body>
</html>
